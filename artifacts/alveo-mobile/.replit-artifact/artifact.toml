kind = "mobile"
previewPath = "/mobile/"
title = "Alvéo Mobile"
version = "1.0.0"
id = "artifacts/alveo-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 21033

[services.development]
run = "pnpm --filter @workspace/alveo-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alveo-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/alveo-mobile", "run", "serve" ]

[services.env]
PORT = "21033"
BASE_PATH = "/mobile/"
